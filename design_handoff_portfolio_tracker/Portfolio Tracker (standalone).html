document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

>\n                <div style=\"{{ n.barStyle }}\"><\u002Fdiv>\n                <div style=\"{{ n.labelStyle }}\">\n                  <div style=\"font-size: 13px; font-weight: 700; color: #3d3328; line-height: 1.2;\">{{ n.name }}<\u002Fdiv>\n                  <div style=\"font-size: 11.5px; color: #8a7d6c; font-variant-numeric: tabular-nums;\">{{ n.valueFmt }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <sc-for list=\"{{ dRightNode }}\" as=\"n\" hint-placeholder-count=\"1\">\n                <div style=\"{{ n.barStyle }}\"><\u002Fdiv>\n                <div style=\"{{ n.labelStyle }}\">\n                  <div style=\"font-size: 14px; font-weight: 700; color: #84422e; line-height: 1.2;\">{{ n.label }}<\u002Fdiv>\n                  <div style=\"font-size: 12px; color: #8a7d6c; font-variant-numeric: tabular-nums;\">{{ n.valueFmt }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- Holdings table -->\n        <sc-if value=\"{{ hasAssets }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"background: #ffffff; border-radius: 22px; padding: 14px 18px; margin-top: 16px;\">\n            <div style=\"display: flex; align-items: center; margin-bottom: 6px; padding: 0 8px;\">\n              <div style=\"font-size: 14px; font-weight: 700;\">ตารางสินทรัพย์ทั้งหมด<\u002Fdiv>\n              <div style=\"margin-left: auto; font-size: 12px; color: #a89a86;\">{{ holdingCount }} รายการ · เรียงตามมูลค่า<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"overflow-x: auto;\">\n              <div style=\"min-width: 900px;\">\n                <div style=\"display: grid; grid-template-columns: 1.9fr 1.2fr 1fr 1.1fr 0.85fr 0.95fr 130px 104px; gap: 10px; padding: 9px 14px; font-size: 11px; font-weight: 700; color: #b3a692; border-bottom: 1px solid #f0e7d8;\">\n                  <div>สินทรัพย์<\u002Fdiv><div>พอร์ต<\u002Fdiv ht: 600; color: #8a7d6c; margin-bottom: 6px;\">ราคาต่อหน่วย (฿)<\u002Fdiv>\n            <input name=\"price\" type=\"number\" value=\"{{ form.price }}\" onchange=\"{{ onFormChange }}\" placeholder=\"0.00\" style=\"width: 100%; padding: 10px 14px; border-radius: 12px; border: 1px solid #e0d5c2; background: #fff; font-size: 14px; color: #3d3328; outline: none;\">\n          <\u002Fdiv>\n          <sc-if value=\"{{ formErr }}\">\n            <div style=\"background: #f3ded6; color: #84422e; font-size: 13px; padding: 9px 14px; border-radius: 12px; margin-bottom: 14px;\">{{ formErrText }}<\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px;\">\n            <button onclick=\"{{ closeModal }}\" style=\"padding: 9px 18px; border-radius: 999px; background: #f0e7d8; color: #6b5d49; font-size: 13.5px; font-weight: 700; border: none; cursor: pointer;\">ยกเลิก<\u002Fbutton>\n            <button onclick=\"{{ submitPrice }}\" style-hover=\"opacity: 0.88;\" style=\"padding: 9px 22px; border-radius: 999px; background: #b45a3c; color: #fff; font-size: 13.5px; font-weight: 700; border: none; cursor: pointer;\">บันทึก<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- CHART modal -->\n        <sc-if value=\"{{ mChart }}\">\n          <div style=\"display: flex; align-items: flex-start; gap: 12px; margin-bottom: 4px;\">\n            <div>\n              <div style=\"font-size: 18px; font-weight: 700;\">{{ chartTitle }}<\u002Fdiv>\n              <div style=\"font-size: 12.5px; color: #8a7d6c;\">{{ chartSub }}<\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ closeModal }}\" style-hover=\"color: #84422e;\" style=\"margin-left: auto; background: none; border: none; color: #b3a692; font-size: 18px; cursor: pointer;\">✕<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display: flex; gap: 6px; margin: 14px 0 6px;\">\n            <sc-for list=\"{{ chartRanges }}\" as=\"r\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ r.onClick }}\" style=\"{{ r.style }}\">{{ r.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ chartLoading }}\">\n            <div style=\"height: 248px; display: flex; align-items: center; justify-content: center; color: #a89a86; font-size: 14px;\">กำลังโหลดราคาย้อนหลัง…<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ chartError }}\">\n            <div style=\"height: 248px; display: flex; align-items: center; justify-content: center; text-align: center; color: #b4543c; font-size: 13.5px; padding: 0 24px; line-height: 1.6;\">ดึงข้อมูลราคาย้อนหลังไม่สำเร็จ — ลองเปลี่ยนช่วงเวลา หรือกดใหม่อีกครั้ง<br>(บริการราคาฟรีอาจจำกัดการเรียกชั่วคราว)<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ chartHasData }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display: flex; gap: 16px; align-items: baseline; margin: 6px 0 8px; flex-wrap: wrap;\">\n              <div style=\"font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums;\">{{ chartCurFmt }}<\u002Fdiv>\n              <div style=\"{{ chartChgStyle }}\">{{ chartChgFmt }}<\u002Fdiv>\n              <div style=\"margin-left: auto; font-size: 12px; color: #8a7d6c;\">สูงสุด {{ chartHiFmt }} · ต่ำสุด {{ chartLoFmt }}<\u002Fdiv>\n            <\u002Fdiv>\n            <svg viewBox=\"0 0 640 190\" style=\"width: 100%; height: auto; display: block;\">\n              <defs>\n                <linearGradient id=\"ch-area\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                  <stop offset=\"0\" style=\"stop-color: #c97a52; stop-opacity: 0.3;\"><\u002Fstop>\n                  <stop offset=\"1\" style=\"stop-color: #c97a52; stop-opacity: 0;\"><\u002Fstop>\n                <\u002FlinearGradient>\n              <\u002Fdefs>\n              <path d=\"{{ chartAreaPath }}\" style=\"fill: url(#ch-area);\"><\u002Fpath>\n              <path d=\"{{ chartLinePath }}\" style=\"fill: none; stroke: #b45a3c; stroke-width: 2.5; stroke-linejoin: round;\"><\u002Fpath>\n              <sc-if value=\"{{ chartHasAvg }}\">\n                <line x1=\"0\" y1=\"{{ chartAvgY }}\" x2=\"640\" y2=\"{{ chartAvgY }}\" style=\"stroke: #5b8a8f; stroke-width: 1.5; stroke-dasharray: 5 4;\"><\u002Fline>\n              <\u002Fsc-if>\n              <circle cx=\"{{ chartDotX }}\" cy=\"{{ chartDotY }}\" r=\"4.5\" style=\"fill: #b45a3c; stroke: #faf5ec; stroke-width: 2.5;\"><\u002Fcircle>\n            <\u002Fsvg>\n            <sc-if value=\"{{ chartHasAvg }}\">\n              <div style=\"display: flex; align-items: center; gap: 8px; font-size: 12px; color: #5b8a8f; font-weight: 600; margin-top: 6px;\">\n                <div style=\"width: 18px; height: 0; border-top: 1.5px dashed #5b8a8f;\"><\u002Fdiv>{{ chartAvgLabel }}\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"display: flex; justify-content: space-between; font-size: 11px; color: #b3a692; margin-top: 8px;\">\n              <sc-for list=\"{{ chartXLabels }}\" as=\"x\" hint-placeholder-count=\"4\">\n                <div>{{ x.label }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { data: null, page: 'overview', modal: null, form: {}, fetching: false, fetchError: false, authed: false, authMode: 'signin', authForm: {}, chart: null };\n\n  componentDidMount() {\n    let data = null;\n    try { data = JSON.parse(localStorage.getItem('porto-tracker-v1')); } catch (e) {}\n    if (!data || !data.portfolios) data = this.seed();\n    let auth = null;\n    try { auth = JSON.parse(localStorage.getItem('porto-auth-v1')); } catch (e) {}\n    const hasAcct = !!(auth && auth.email);\n    const authed = !!(auth && auth.loggedIn);\n    this.setState({ data, authed, authMode: hasAcct ? 'signin' : 'signup', authForm: { name: (auth && auth.name) || '', email: (auth && auth.email) || '', pass: '' } }, () => { if (authed) this.refresh(); });\n    this._timer = setInterval(() => { if (this.state.authed) this.refresh(); }, 120000);\n  }\n  componentWillUnmount() { clearInterval(this._timer); }\n\n  save(data, extra) {\n    try { localStorage.setItem('porto-tracker-v1', JSON.stringify(data)); } catch (e) {}\n    this.setState(Object.assign({ data: Object.assign({}, data) }, extra || {}));\n  }\n  uid(p) { const d = this.state.data; d.seq = (d.seq || 1) + 1; return p + d.seq; }\n\n  seed() {\n    const now = Date.now(), day = 86400000;\n    const d = n => new Date(now - n * day).toISOString().slice(0, 10);\n    const portfolios = [\n      { id: 'p1', name: 'เก็บออม', color: 0 },\n      { id: 'p2', name: 'ลงทุนระยะยาว', color: 1 },\n      { id: 'p3', name: 'Gamble', color: 2 }\n    ];\n    const assets = [\n      { id: 'a1', pid: 'p1', type: 'deposit', sym: 'SCB e-Savings', name: 'บัญชีออมทรัพย์ SCB', ccy: 'THB' },\n      { id: 'a2', pid: 'p1', type: 'fund', sym: 'K-CHANGE-A(A)', name: 'กองทุน K-CHANGE', ccy: 'THB', manualPrice: 14.31 },\n      { id: 'a3', pid: 'p2', type: 'us', sym: 'NVDA', name: 'NVIDIA Corp', ccy: 'USD' },\n      { id: 'a4', pid: 'p2', type: 'us', sym: 'AAPL', name: 'Apple Inc', ccy: 'USD' },\n      { id: 'a5', pid: 'p2', type: 'us', sym: 'VOO', name: 'Vanguard S&P 500 ETF', ccy: 'USD' },\n      { id: 'a6', pid: 'p2', type: 'th', sym: 'PTT', name: 'ปตท.', ccy: 'THB' },\n      { id: 'a7', pid: 'p2', type: 'th', sym: 'CPALL', name: 'ซีพี ออลล์', ccy: 'THB' },\n      { id: 'a8', pid: 'p3', type: 'crypto', sym: 'BTC', name: 'Bitcoin', ccy: 'THB', cg: 'bitcoin' },\n      { id: 'a9', pid: 'p3', type: 'crypto', sym: 'ETH', name: 'Ethereum', ccy: 'THB', cg: 'ethereum' },\n      { id: 'a10', pid: 'p3', type: 'crypto', sym: 'SOL', name: 'Solana', ccy: 'THB', cg: 'solana' }\n    ];\n    const transactions = [\n      { id: 't1', aid: 'a1', side: 'buy', qty: 400000, price: 1, date: d(360) },\n      { id: 't2', aid: 'a1', side: 'buy', qty: 120000, price: 1, date: d(180) },\n      { id: 't3', aid: 'a1', side: 'buy', qty: 100000, price: 1, date: d(45) },\n      { id: 't4', aid: 'a2', side: 'buy', qty: 20000, price: 12.8, date: d(300) },\n      { id: 't5', aid: 'a2', side: 'buy', qty: 15000, price: 13.4, date: d(120) },\n      { id: 't6', aid: 'a3', side: 'buy', qty: 10, price: 88, date: d(330) },\n      { id: 't7', aid: 'a3', side: 'buy', qty: 4, price: 116, date: d(150) },\n      { id: 't8', aid: 'a4', side: 'buy', qty: 18, price: 189.5, date: d(280) },\n      { id: 't9', aid: 'a5', side: 'buy', qty: 9, price: 468, date: d(250) },\n      { id: 't10', aid: 'a6', side: 'buy', qty: 6000, price: 35.5, date: d(310) },\n      { id: 't11', aid: 'a7', side: 'buy', qty: 3000, price: 61.75, date: d(200) },\n      { id: 't12', aid: 'a8', side: 'buy', qty: 0.2, price: 2350000, date: d(340) },\n      { id: 't13', aid: 'a8', side: 'sell', qty: 0.05, price: 3300000, date: d(60) },\n      { id: 't14', aid: 'a9', side: 'buy', qty: 1.2, price: 118000, date: d(220) },\n      { id: 't15', aid: 'a10', side: 'buy', qty: 18, price: 4650, date: d(90) }\n    ];\n    const liabilities = [\n      { id: 'l1', name: 'สินเชื่อรถ', amount: 385000 },\n      { id: 'l2', name: 'กยศ.', amount: 137000 },\n      { id: 'l3', name: 'บัตรเครดิต', amount: 42500 }\n    ];\n    const history = [];\n    const base = [2.18, 2.22, 2.2, 2.31, 2.28, 2.42, 2.39, 2.52, 2.61, 2.58, 2.72, 2.8];\n    for (let i = 0; i < 12; i++) history.push({ d: new Date(now - (11 - i) * 30 * day).toISOString().slice(0, 10), v: Math.round(base[i] * 1000000) });\n    const prices = {\n      a8: { price: 3842000, chg: 1.8 }, a9: { price: 128400, chg: -0.7 }, a10: { price: 5230, chg: 2.4 },\n      a3: { price: 182.4, chg: 2.3 }, a4: { price: 224.1, chg: 0.4 }, a5: { price: 548.2, chg: 0.6 },\n      a6: { price: 33.25, chg: -0.8 }, a7: { price: 64, chg: 0.5 }\n    };\n    return { portfolios, assets, transactions, liabilities, history, prices, fx: 35.84, lastUpdated: null, cur: 'THB', seq: 100 };\n  }\n\n  position(aid) {\n    const txs = this.state.data.transactions.filter(t => t.aid === aid).sort((a, b) => (a.date < b.date ? -1 : 1));\n    let qty = 0, cost = 0, realized = 0;\n    for (const t of txs) {\n      const q = +t.qty, p = +t.price, f = +(t.fee || 0);\n      if (t.side === 'buy') { cost += q * p + f; qty += q; }\n      else {\n        const avg = qty > 0 ? cost / qty : 0;\n        realized += q * (p - avg) - f; cost -= avg * q; qty -= q;\n        if (qty < 1e-9) { qty = 0; cost = 0; }\n      }\n    }\n    return { qty, avg: qty > 0 ? cost / qty : 0, realized };\n  }\n  priceOf(a, pos) {\n    if (a.type === 'deposit') return 1;\n    const p = this.state.data.prices[a.id];\n    if (p && p.price) return p.price;\n    if (a.manualPrice) return +a.manualPrice;\n    return pos ? pos.avg : 0;\n  }\n  totals(data) {\n    let assets = 0, day = 0, cost = 0;\n    for (const a of data.assets) {\n      const pos = this.position(a.id);\n      if (pos.qty <= 0) continue;\n      const pr = this.priceOf(a, pos);\n      const mult = a.ccy === 'USD' ? data.fx : 1;\n      const v = pos.qty * pr * mult;\n      assets += v; cost += pos.qty * pos.avg * mult;\n      const pinfo = data.prices[a.id];\n      if (pinfo && pinfo.chg) day += v - v / (1 + pinfo.chg / 100);\n    }\n    const liab = data.liabilities.reduce((s, l) => s + +l.amount, 0);\n    return { assets, liab, nw: assets - liab, day, cost };\n  }\n\n  async refresh() {\n    const data = this.state.data;\n    if (!data || this.state.fetching) return;\n    this.setState({ fetching: true });\n    let err = false;\n    const prices = Object.assign({}, data.prices);\n    const cryptos = data.assets.filter(a => a.type === 'crypto' && a.cg);\n    const ids = Array.from(new Set(cryptos.map(a => a.cg).concat(['bitcoin']))).join(',');\n    try {\n      const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=' + ids + '&vs_currencies=thb,usd&include_24hr_change=true');\n      const j = await r.json();\n      if (j.bitcoin && j.bitcoin.thb && j.bitcoin.usd) data.fx = j.bitcoin.thb / j.bitcoin.usd;\n      for (const a of cryptos) {\n        const c = j[a.cg];\n        if (c && c.thb) prices[a.id] = { price: c.thb, chg: c.thb_24h_change || 0, t: Date.now() };\n      }\n    } catch (e) { err = true; }\n    const stocks = data.assets.filter(a => a.type === 'th' || a.type === 'us' || (a.type === 'fund' && a.ysym));\n    await Promise.all(stocks.map(async a => {\n      const sym = a.ysym || (a.type === 'th' ? a.sym + '.BK' : a.sym);\n      const q = await this.yahoo(sym);\n      if (q) prices[a.id] = { price: q.price, chg: q.chg, t: Date.now() };\n      else if (!prices[a.id]) err = true;\n    }));\n    data.prices = prices;\n    data.lastUpdated = Date.now();\n    const today = new Date().toISOString().slice(0, 10);\n    const nw = this.totals(data).nw;\n    data.history = data.history.filter(x => x.d !== today).concat([{ d: today, v: nw }]).sort((x, y) => (x.d < y.d ? -1 : 1));\n    this.save(data, { fetching: false, fetchError: err });\n  }\n  async yahoo(sym) {\n    const url = 'https://query1.finance.yahoo.com/v8/finance/chart/' + encodeURIComponent(sym) + '?interval=1d&range=1d';\n    const wraps = [u => 'https://corsproxy.io/?url=' + encodeURIComponent(u), u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u)];\n    for (const w of wraps) {\n      try {\n        const r = await fetch(w(url));\n        if (!r.ok) continue;\n        const j = await r.json();\n        const m = j && j.chart && j.chart.result && j.chart.result[0] && j.chart.result[0].meta;\n        if (m && m.regularMarketPrice) {\n          const prev = m.chartPreviousClose || m.previousClose || m.regularMarketPrice;\n          return { price: m.regularMarketPrice, chg: prev ? (m.regularMarketPrice / prev - 1) * 100 : 0 };\n        }\n      } catch (e) {}\n    }\n    return null;\n  }\n\n  open(modal, form) { this.setState({ modal, form: form || {} }); }\n  close() { this.setState({ modal: null, form: {}, chart: null }); }\n  defaultTxForm(aid) {\n    const data = this.state.data;\n    const id = aid || (data.assets[0] && data.assets[0].id) || '';\n    const a = data.assets.find(x => x.id === id);\n    const pos = a ? this.position(a.id) : null;\n    const pr = a ? this.priceOf(a, pos) : '';\n    return { aid: id, side: 'buy', qty: '', price: a && a.type === 'deposit' ? 1 : (pr || ''), fee: '', date: new Date().toISOString().slice(0, 10) };\n  }\n\n  submitTx() {\n    const data = this.state.data, f = this.state.form;\n    const a = data.assets.find(x => x.id === f.aid);\n    if (!a) return this.setState({ form: Object.assign({}, f, { err: 'เลือกสินทรัพย์ก่อน — ถ้ายังไม่มีให้กด \"+ เพิ่มสินทรัพย์ใหม่\"' }) });\n    const qty = +f.qty, price = a.type === 'deposit' ? 1 : +f.price, fee = +(f.fee || 0);\n    if (!(qty > 0)) return this.setState({ form: Object.assign({}, f, { err: 'กรอกจำนวนให้ถูกต้อง' }) });\n    if (!(price >= 0) || (a.type !== 'deposit' && !(price > 0))) return this.setState({ form: Object.assign({}, f, { err: 'กรอกราคาให้ถูกต้อง' }) });\n    if (f.side === 'sell') {\n      const pos = this.position(a.id);\n      if (qty > pos.qty + 1e-9) return this.setState({ form: Object.assign({}, f, { err: 'ขายเกินจำนวนที่ถืออยู่ (' + pos.qty + ')' }) });\n    }\n    data.transactions.push({ id: this.uid('t'), aid: a.id, side: f.side || 'buy', qty, price, fee, date: f.date || new Date().toISOString().slice(0, 10) });\n    this.save(data, { modal: null, form: {} });\n  }\n  submitAsset() {\n    const data = this.state.data, f = this.state.form;\n    const sym = (f.symbol || '').trim();\n    const pid = f.pid || (data.portfolios[0] && data.portfolios[0].id);\n    if (!pid) return this.setState({ form: Object.assign({}, f, { err: 'ยังไม่มีพอร์ต — สร้างพอร์ตก่อน' }) });\n    if (!sym) return this.setState({ form: Object.assign({}, f, { err: 'กรอก Symbol ก่อน' }) });\n    const type = f.type || 'crypto';\n    const CG = { BTC: 'bitcoin', ETH: 'ethereum', SOL: 'solana', BNB: 'binancecoin', XRP: 'ripple', ADA: 'cardano', DOGE: 'dogecoin', DOT: 'polkadot', MATIC: 'matic-network', AVAX: 'avalanche-2', LINK: 'chainlink', UNI: 'uniswap', LTC: 'litecoin', NEAR: 'near', ATOM: 'cosmos', OP: 'optimism', ARB: 'arbitrum', SUI: 'sui', APT: 'aptos', PEPE: 'pepe', SHIB: 'shiba-inu', TON: 'the-open-network', TRX: 'tron', USDT: 'tether', USDC: 'usd-coin' };\n    let cg = null;\n    if (type === 'crypto') {\n      cg = (f.cg || '').trim().toLowerCase() || CG[sym.toUpperCase()];\n      if (!cg) return this.setState({ form: Object.assign({}, f, { err: 'ไม่รู้จักเหรียญนี้ — กรอก CoinGecko ID (ดูได้จาก URL ของเหรียญใน coingecko.com)' }) });\n    }\n    const a = { id: this.uid('a'), pid, type, sym: type === 'crypto' || type === 'us' || type === 'th' ? sym.toUpperCase() : sym, name: (f.name || '').trim() || sym, ccy: type === 'us' ? 'USD' : 'THB' };\n    if (cg) a.cg = cg;\n    if (type === 'fund' && +f.nav > 0) a.manualPrice = +f.nav;\n    data.assets.push(a);\n    const oqty = +f.oqty;\n    if (oqty > 0) {\n      const oprice = type === 'deposit' ? 1 : +f.oprice;\n      if (type !== 'deposit' && !(oprice > 0)) { data.assets.pop(); return this.setState({ form: Object.assign({}, f, { err: 'กรอกราคาต่อหน่วยของรายการซื้อเริ่มต้น (หรือเว้นจำนวนว่างไว้)' }) }); }\n      data.transactions.push({ id: this.uid('t'), aid: a.id, side: 'buy', qty: oqty, price: oprice, fee: +(f.ofee || 0), date: f.odate || new Date().toISOString().slice(0, 10) });\n      this.save(data, { modal: null, form: {} });\n      this.refresh();\n    } else {\n      this.save(data, { modal: 'tx', form: this.defaultTxForm(a.id) });\n      this.refresh();\n    }\n  }\n  submitPortfolio() {\n    const data = this.state.data, f = this.state.form;\n    const name = (f.name || '').trim();\n    if (!name) return this.setState({ form: Object.assign({}, f, { err: 'ตั้งชื่อพอร์ตก่อน' }) });\n    data.portfolios.push({ id: this.uid('p'), name, color: data.portfolios.length % 6 });\n    this.save(data, { modal: null, form: {}, page: 'ports' });\n  }\n  submitLiab() {\n    const data = this.state.data, f = this.state.form;\n    if (f.editId) {\n      const item = data.liabilities.find(x => x.id === f.editId);\n      if (!item) return this.close();\n      const mode = f.mode || 'set';\n      let next;\n      if (mode === 'set') {\n        const name = (f.name || '').trim(), amount = +f.amount;\n        if (!name || !(amount > 0)) return this.setState({ form: Object.assign({}, f, { err: 'กรอกชื่อและยอดให้ถูกต้อง' }) });\n        item.name = name; next = amount;\n      } else {\n        const d2 = Math.abs(parseFloat(String(f.delta || '').replace(/,/g, '')));\n        if (!(d2 > 0)) return this.setState({ form: Object.assign({}, f, { err: 'กรอกจำนวนเงินให้ถูกต้อง' }) });\n        next = mode === 'pay' ? +item.amount - d2 : +item.amount + d2;\n      }\n      if (next <= 0) { data.liabilities = data.liabilities.filter(x => x.id !== f.editId); }\n      else { item.amount = next; }\n      return this.save(data, { modal: null, form: {} });\n    }\n    const name = (f.name || '').trim(), amount = +f.amount;\n    if (!name || !(amount > 0)) return this.setState({ form: Object.assign({}, f, { err: 'กรอกชื่อและยอดให้ถูกต้อง' }) });\n    data.liabilities.push({ id: this.uid('l'), name, amount });\n    this.save(data, { modal: null, form: {} });\n  }\n  submitPrice() {\n    const data = this.state.data, f = this.state.form;\n    const a = data.assets.find(x => x.id === f.aid);\n    const price = +f.price;\n    if (!a || !(price > 0)) return this.setState({ form: Object.assign({}, f, { err: 'กรอกราคาให้ถูกต้อง' }) });\n    a.manualPrice = price;\n    delete data.prices[a.id];\n    this.save(data, { modal: null, form: {} });\n  }\n\n  saveAuth(patch) {\n    let auth = {};\n th-v1')) || {}; } catch (e) {}\n    this.setState({ authed: false, modal: null, chart: null, authMode: auth.email ? 'signin' : 'signup', authForm: { name: auth.name || '', email: auth.email || '', pass: '' } });\n  }\n\n  openChart(aid) {\n    this.setState({ modal: 'chart', chart: { aid, range: '3M', series: [], loading: true, error: false } });\n    this.loadChart(aid, '3M');\n  }\n  async loadChart(aid, range) {\n    this.setState({ chart: { aid, range, series: [], loading: true, error: false } });\n    const a = this.state.data.assets.find(x => x.id === aid);\n    if (!a) return;\n    let series = [], error = false;\n    try {\n      if (a.type === 'crypto' && a.cg) {\n        const days = range === '7D' ? 7 : range === '1M' ? 30 : range === '3M' ? 90 : 365;\n        const r = await fetch('https://api.coingecko.com/api/v3/coins/' + a.cg + '/market_chart?vs_currency=thb&days=' + days);\n        const j = await r.json();\n        series = (j.prices || []).map(p => ({ t: p[0], p: p[1] }));\n      } else if (a.type === 'th' || a.type === 'us') {\n        const map = { '7D': ['1mo', '1d', 7], '1M': ['1mo', '1d', 0], '3M': ['3mo', '1d', 0], '1Y': ['1y', '1wk', 0] };\n        const cfg = map[range] || map['3M'];\n        const sym = a.ysym || (a.type === 'th' ? a.sym + '.BK' : a.sym);\n        series = await this.yahooHist(sym, cfg[0], cfg[1]);\n        if (cfg[2]) series = series.slice(-cfg[2]);\n      }\n    } catch (e) { error = true; }\n    if (!series.length) error = true;\n    if (this.state.chart && this.state.chart.aid === aid) this.setState({ chart: { aid, range, series, loading: false, error } });\n  }\n  async yahooHist(sym, range, interval) {\n    const url = 'https://query1.finance.yahoo.com/v8/finance/chart/' + encodeURIComponent(sym) + '?interval=' + interval + '&range=' + range;\n    const wraps = [u => 'https://corsproxy.io/?url=' + encodeURIComponent(u), u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u)];\n    for (const w of wraps) {
